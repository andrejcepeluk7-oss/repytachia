<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RPG Репутация</title>

<style>
  body {
    font-family: "Comic Sans MS", cursive;
    background: #1a1a1a;
    color: white;
    margin: 0;
    padding: 10px;
  }

  .container {
    max-width: 420px;
    margin: 0 auto;
  }

  /* ===== КАРТИНКА ===== */
  #preview {
    width: 260px;
    height: 260px;
    object-fit: cover;
    border-radius: 14px;
    background: #333;
    display: block;
    margin: 10px auto 18px auto;
  }

  #fileInput {
    display: none;
  }

  /* ===== РЯДЫ ===== */
  .row {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 6px;
    margin-left: calc(50% - 130px);
    margin-bottom: 10px;
  }

  /* ===== ПОЛЯ ===== */
  select, input {
    width: 160px;
    height: 34px;

    border: none;
    border-radius: 10px;
    background: #3a3a3a;
    color: white;

    font-size: 14px;
    text-align: center;
    outline: none;
    font-family: "Comic Sans MS", cursive;
  }

  /* ===== КНОПКИ ===== */
  button.icon {
    width: 34px;
    height: 34px;
    border: none;
    background: transparent;
    color: white;
    font-size: 18px;
    cursor: pointer;
  }

  button.plus {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: none;
    background: #3a3a3a;
    color: white;
    font-size: 18px;
    cursor: pointer;
  }

  button.minus {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: none;
    background: #3a3a3a;
    color: white;
    font-size: 18px;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.9);
  }

  /* ===== РЕПУТАЦИЯ ===== */
  .rep-box {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin: 10px 0 5px 0;
  }

  .rep {
    font-size: 30px;
  }

  /* ===== ОПИСАНИЕ ===== */
  .desc {
    margin-top: 10px;
    max-width: 260px;
    text-align: left;
    white-space: pre-line;
    color: #ddd;

    margin-left: calc(50% - 130px);
    font-size: 15px;
    line-height: 1.4;
  }

  /* ===== МОБИЛКА ===== */
  @media (max-width: 600px) {
    #preview {
      width: 90vw;
      height: 90vw;
    }

    .row, .desc {
      margin-left: 5vw;
    }

    select, input {
      width: 55vw;
    }
  }

</style>
</head>

<body>

<div class="container">

<img id="preview" src="">
<input type="file" id="fileInput" accept="image/*">

<!-- ===== ФРАКЦИИ ===== -->
<div class="row">
  <select id="factionSelect"></select>
  <button class="icon" onclick="deleteFaction()">🗑️</button>
  <button class="icon" onclick="document.getElementById('fileInput').click()">📷</button>
</div>

<div class="row">
  <input id="factionInput" placeholder="Фракция">
  <button class="plus" onclick="addFaction()">＋</button>
</div>

<!-- ===== ПЕРСОНАЖИ ===== -->
<div class="row">
  <select id="charSelect"></select>
  <button class="icon" onclick="deleteChar()">🗑️</button>
</div>

<div class="row">
  <input id="charInput" placeholder="Персонаж">
  <button class="plus" onclick="addChar()">＋</button>
</div>

<!-- ===== РЕПУТАЦИЯ ===== -->
<div class="rep-box">
  <button class="minus" onclick="change(-1)">-</button>
  <div class="rep" id="repValue">0</div>
  <button class="plus" onclick="change(1)">+</button>
</div>

<div class="desc" id="desc"></div>

</div>

<script>

/* ===== ДАННЫЕ ===== */
let world = JSON.parse(localStorage.getItem("world")) || {
  factions: { "НПС": {} }
};

let currentFaction = localStorage.getItem("currentFaction") || "НПС";
let currentChar = localStorage.getItem("currentChar") || null;

/* ===== СОХРАНЕНИЕ ===== */
function save() {
  localStorage.setItem("world", JSON.stringify(world));
  localStorage.setItem("currentFaction", currentFaction);
  localStorage.setItem("currentChar", currentChar);
}
/* ===== НОВАЯ ШКАЛА РЕПУТАЦИИ ===== */
function getText(v) {
  const map = {
    "-10": "Враг народа: полное уничтожение доверия.",
    "-9": "Заклятый враг: атаки без разговоров.",
    "-8": "Опасный преступник: сообщают властям.",
    "-7": "Известный нарушитель: избегают контакта.",
    "-6": "Под наблюдением: за вами следят.",
    "-5": "Нежелательный элемент: завышенные цены.",
    "-4": "Плохая репутация: слухи распространяются.",
    "-3": "Недоверие: скрывают информацию.",
    "-2": "Холодное отношение: минимальный контакт.",
    "-1": "Неприязнь: избегают общения.",
    "0": "Нейтралитет: обычное отношение.",
    "1": "Знакомый: вас узнают.",
    "2": "Интерес: к вам присматриваются.",
    "3": "Доверие: начинают слушать.",
    "4": "Уважение: учитывают мнение.",
    "5": "Надёжный человек: можно доверять.",
    "6": "Сильный союзник: помогают без просьбы.",
    "7": "Партнёр: вас учитывают в решениях.",
    "8": "Герой региона: вас уважают.",
    "9": "Легенда: ваше имя известно.",
    "10": "Символ мира: влияние на общество."
  };

  return map[v] || "Неизвестно";
}

/* ===== ЗАГРУЗКА ===== */
function loadFactions() {
  let sel = document.getElementById("factionSelect");
  sel.innerHTML = "";

  for (let f in world.factions) {
    let opt = document.createElement("option");
    opt.value = f;
    opt.textContent = f;
    sel.appendChild(opt);
  }

  sel.value = currentFaction;
}

function loadChars() {
  let sel = document.getElementById("charSelect");
  sel.innerHTML = "";

  let list = world.factions[currentFaction];

  for (let c in list) {
    let opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  }

  currentChar = Object.keys(list)[0] || null;
  sel.value = currentChar;
}

/* ===== СОЗДАНИЕ ===== */
function addFaction() {
  let name = document.getElementById("factionInput").value.trim();
  if (!name) return;

  world.factions[name] = {};
  currentFaction = name;

  document.getElementById("factionInput").value = "";

  loadFactions();
  loadChars();
  update();
  save();
}

function addChar() {
  let name = document.getElementById("charInput").value.trim();
  if (!name) return;

  world.factions[currentFaction][name] = {
    rep: 0,
    img: ""
  };

  document.getElementById("charInput").value = "";

  loadChars();
  currentChar = name;

  update();
  save();
}

/* ===== УДАЛЕНИЕ ===== */
function deleteFaction() {
  delete world.factions[currentFaction];

  currentFaction = Object.keys(world.factions)[0] || null;

  loadFactions();
  loadChars();
  update();
  save();
}

function deleteChar() {
  delete world.factions[currentFaction][currentChar];

  currentChar = Object.keys(world.factions[currentFaction])[0] || null;

  loadChars();
  update();
  save();
}

/* ===== СМЕНА ===== */
document.getElementById("factionSelect").onchange = e => {
  currentFaction = e.target.value;
  loadChars();
  update();
  save();
};

document.getElementById("charSelect").onchange = e => {
  currentChar = e.target.value;
  update();
  save();
};

/* ===== ОБНОВЛЕНИЕ ===== */
function update() {
  if (!currentChar) return;

  let obj = world.factions[currentFaction][currentChar];

  document.getElementById("repValue").textContent = obj.rep;
  document.getElementById("desc").textContent = getText(obj.rep);

  document.getElementById("preview").src = obj.img || "";
}

/* ===== РЕПУТАЦИЯ ===== */
function change(v) {
  let obj = world.factions[currentFaction][currentChar];

  obj.rep += v;

  if (obj.rep > 10) obj.rep = 10;
  if (obj.rep < -10) obj.rep = -10;

  update();
  save();
}

/* ===== ФОТО ===== */
document.getElementById("fileInput").onchange = e => {
  let file = e.target.files[0];
  if (!file) return;

  let reader = new FileReader();

  reader.onload = () => {
    world.factions[currentFaction][currentChar].img = reader.result;
    update();
    save();
  };

  reader.readAsDataURL(file);
};

/* ===== START ===== */
loadFactions();
loadChars();
update();

</script>

</body>
</html>
